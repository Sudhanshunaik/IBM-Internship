schedule: "0 19 * * 0"
name: weekly-progress-report
description: Sends a personalized weekly progress report every Sunday at 7 PM with scores, improvements, and next week's study goals.
prompt: |
  Generate a complete weekly progress report for the student.
  
  Use the progress-tracker skill to:
  1. Read all quiz scores and topics covered this week from memory
  2. Compare with last week's performance
  3. Identify the most improved topic
  4. Identify the topic needing most attention
  5. Set 3 goals for next week
  
  Format as a friendly, encouraging message that a student would
  love to receive on a Sunday evening to prepare for the coming week.
  
  End with: "See you tomorrow! Let's make next week even better! 💪"
